{{ define "main" }}
<div class="max-w-4xl w-full">
    <div class="grid md:grid-cols-2 gap-12 items-center">
        
        <!-- Profile Image & Deco (Order 2 mobile, Order 1 Desktop) -->
        <div class="order-2 md:order-1 flex justify-center">
            <div class="relative group">
                <!-- Blobs: Yellow & Blue -->
                <div class="absolute inset-0 bg-yellow-300 blob transform rotate-6 group-hover:rotate-12 transition-transform duration-500"></div>
                <div class="absolute inset-0 bg-blue-300 blob transform -rotate-3 group-hover:-rotate-6 transition-transform duration-500 delay-75"></div>
                
                <!-- Image Container -->
                <div class="relative w-64 h-64 md:w-80 md:h-80 bg-slate-200 blob overflow-hidden border-4 border-white shadow-2xl flex items-center justify-center z-10">
                    <img src="/img/me.png" alt="Dustin Michels" class="w-full h-full object-cover">
                </div>

                <!-- Decorative elements -->
                <div class="absolute -top-4 -right-4 text-4xl animate-bounce z-20">🏙️</div>
                <div class="absolute -bottom-4 -left-4 text-4xl animate-pulse z-20">🌳</div>
            </div>
        </div>

        <!-- Text Content (Order 1 mobile, Order 2 Desktop) -->
        <div class="order-1 md:order-2 space-y-6">
            <h1 class="text-5xl md:text-7xl font-extrabold text-slate-800 leading-tight">
                {{ .Site.Params.hero_title | safeHTML }}
            </h1>
            <p class="text-xl md:text-2xl text-slate-700 leading-relaxed">
                {{ .Site.Params.hero_subtitle | safeHTML }}
            </p>
            
            <div class="flex flex-wrap gap-2">
                {{ range .Site.Params.tags }}
                <span class="bg-white px-4 py-2 rounded-full border-2 border-slate-200 text-sm font-bold text-slate-600 hover:border-green-400 hover:text-green-600 transition-colors cursor-default">
                    {{ . }}
                </span>
                {{ end }}
            </div>

            <div class="bg-yellow-50 p-6 rounded-3xl border-2 border-dashed border-yellow-400 shadow-sm">
                <h3 class="font-bold text-yellow-800 mb-2 text-xl">{{ .Site.Params.mission_title }}</h3>
                <p class="text-slate-700">
                    {{ .Site.Params.mission_text | safeHTML }}
                </p>
            </div>
        </div>
    </div>
</div>
{{ end }}
