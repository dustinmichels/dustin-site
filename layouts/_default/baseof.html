<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="map-grid min-h-screen bg-green-50 overflow-x-hidden">
    <div id="app" class="relative min-h-screen flex flex-col">
      {{ partial "decorations.html" . }}


      <!-- Animated Bike Path Layer -->
      <!-- Use 100lvh to prevent resize jumps on mobile when URL bar collapses -->
      <div class="fixed top-0 left-0 w-full h-[100lvh] pointer-events-none z-0 opacity-30">
        <svg
          id="bike-svg"
          width="100%"
          height="100%"
          viewBox="0 0 1400 800"
          preserveAspectRatio="xMidYMid slice"
        >
          <path
            id="motionPath"
            class="bike-path-dashed"
            fill="none"
            stroke="#22c55e"
            stroke-width="4"
            stroke-linecap="round"
          />
          <!-- Bike inside SVG for proper coordinate alignment -->
          <text
            id="bike-rider-gsap"
            font-size="50"
            text-anchor="middle"
            dominant-baseline="middle"
            style="transform-origin: center"
          >
            🚲
          </text>
        </svg>
      </div>

      {{ partial "nav.html" . }}


      <!-- Main Content -->
      <main
        class="flex-grow flex items-center justify-center p-6 relative z-10 w-full"
      >
        <div class="w-full flex justify-center">
          {{ block "main" . }}{{ end }}
        </div>
      </main>

      {{ partial "footer.html" . }}
    </div>

    {{ partial "head/js.html" . }}
  </body>
</html>
