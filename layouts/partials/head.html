{{/* Document head - meta, scripts, fonts, and styles */}}
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>
  {{ if .IsHome }}
    {{ site.Title }}
  {{ else }}
    {{ printf "%s | %s" .Title
      site.Title
    }}
  {{ end }}
</title>

<!-- Favicon -->
<link type="image/png" sizes="16x16" rel="icon" href="https://img.icons8.com/ios-filled/16/bicycle.png">
<link type="image/png" sizes="32x32" rel="icon" href="https://img.icons8.com/ios-filled/32/bicycle.png">
<link type="image/png" sizes="96x96" rel="icon" href="https://img.icons8.com/ios-filled/96/bicycle.png">

<!-- Swup (page transitions) -->
<script defer src="https://unpkg.com/swup@4"></script>
<script defer src="https://unpkg.com/@swup/head-plugin@2"></script>

<!-- GSAP (animations) -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script
  defer
  src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"
></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Grandstander:wght@100..900&family=Quicksand:wght@300..700&display=swap"
  rel="stylesheet"
/>

<!-- Custom CSS -->
{{ partialCached "head/css.html" . }}
