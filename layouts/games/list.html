{{ define "main" }}
  <div class="max-w-2xl w-full text-center">
    <h2 class="text-5xl text-slate-900 mb-6 uppercase">{{ .Title }}</h2>
    <div class="bg-orange-500 text-white p-12 rounded-[3rem] custom-shadow">
      <div class="text-8xl mb-6">🕹️</div>
      <h3 class="text-3xl mb-4">Under Construction</h3>
      <p class="text-orange-100 text-lg mb-8">{{ .Content }}</p>
      <button
        class="bg-white text-orange-600 font-black px-10 py-4 rounded-full hover:scale-105 transition-transform uppercase tracking-widest text-sm"
      >
        Notify Me
      </button>
    </div>
  </div>
{{ end }}
